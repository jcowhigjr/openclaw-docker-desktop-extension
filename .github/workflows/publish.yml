name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  EXTENSION_IMAGE_NAME: jcowhigjr/openclaw-docker-desktop-extension
  RUNTIME_IMAGE_NAME: jcowhigjr/openclaw-docker-desktop-extension-runtime

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for runtime
        id: runtime-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: runtime
          file: runtime/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.runtime-meta.outputs.tags }}
          labels: ${{ steps.runtime-meta.outputs.labels }}

      - name: Docker metadata for extension
        id: extension-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.EXTENSION_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push extension image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.extension-meta.outputs.tags }}
          labels: ${{ steps.extension-meta.outputs.labels }}
          build-args: |
            VITE_DEFAULT_RUNTIME_IMAGE=${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE_NAME }}:${{ steps.runtime-meta.outputs.version }}
