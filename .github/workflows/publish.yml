name: Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to publish or repair
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  EXTENSION_IMAGE_NAME: jcowhigjr/openclaw-docker-desktop-extension
  RUNTIME_IMAGE_NAME: jcowhigjr/openclaw-docker-desktop-extension-runtime

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Resolve release metadata
        id: release-context
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${INPUT_RELEASE_TAG}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          case "${release_tag}" in
            v*)
              ;;
            *)
              echo "release_tag must start with v, got: ${release_tag}" >&2
              exit 1
              ;;
          esac

          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

          channel_tag=""
          has_channel_tag=false

          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            case "${release_tag}" in
              *-*)
                channel_tag="beta"
                ;;
              *)
                channel_tag="stable"
                ;;
            esac
            has_channel_tag=true
          fi

          {
            echo "release_tag=${release_tag}"
            echo "channel_tag=${channel_tag}"
            echo "has_channel_tag=${has_channel_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for runtime
        id: runtime-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=${{ steps.release-context.outputs.channel_tag }},enable=${{ steps.release-context.outputs.has_channel_tag }}
            type=sha,prefix=sha-

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: runtime
          file: runtime/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.runtime-meta.outputs.tags }}
          labels: ${{ steps.runtime-meta.outputs.labels }}

      - name: Run Trivy vulnerability scanner (runtime)
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE_NAME }}:${{ steps.runtime-meta.outputs.version }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Docker metadata for extension
        id: extension-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.EXTENSION_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=sha,prefix=sha-

      - name: Build and push extension image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.extension-meta.outputs.tags }}
          labels: ${{ steps.extension-meta.outputs.labels }}
          build-args: |
            VITE_DEFAULT_RUNTIME_IMAGE=${{ env.REGISTRY }}/${{ env.RUNTIME_IMAGE_NAME }}:${{ steps.runtime-meta.outputs.version }}

      - name: Run Trivy vulnerability scanner (extension)
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.EXTENSION_IMAGE_NAME }}:${{ steps.extension-meta.outputs.version }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Create or update GitHub release for tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
