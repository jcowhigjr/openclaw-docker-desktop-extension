name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Build runtime image
        run: docker build -t openclaw-docker-extension-runtime:test -f runtime/Dockerfile runtime

      - name: Build extension image
        run: docker build -t openclaw-docker-extension:test .

      - name: Verify release bundle wiring
        run: make verify-release-bundle RELEASE_TAG=v0.0.0-ci
